name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Single source of truth: same target developers run locally.
      # `make run-ci` self-installs golangci-lint and govulncheck.
      - run: make run-ci
