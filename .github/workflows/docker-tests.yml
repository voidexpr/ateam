name: Docker Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'test/**'
      - 'Dockerfile*'
      - 'internal/container/**'

permissions:
  contents: read

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Docker integration tests
        run: make test-docker
