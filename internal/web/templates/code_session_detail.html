{{define "code_session_detail.html"}}
{{$d := .Data}}
<a href="/p/{{.ProjectSlug}}/code" class="back-link">&larr; Code Sessions</a>
<div class="page-header">
  <h1>{{$d.DirName}}</h1>
  <p class="subtitle">{{fmtDateAge $d.Timestamp}}</p>
</div>

{{if $d.HasReport}}
<div style="margin-bottom:16px">
  <a href="/p/{{$.ProjectSlug}}/code/{{$d.DirName}}/execution_report.md" class="btn">View Execution Report</a>
</div>
{{end}}

<div class="section">
  <div class="section-title">Files</div>
  <table class="data-table">
    <thead>
      <tr><th>File</th><th>Size</th><th>Modified</th></tr>
    </thead>
    <tbody>
      {{range $d.Files}}
      <tr data-href="/p/{{$.ProjectSlug}}/code/{{$d.DirName}}/{{.Name}}">
        <td><a href="/p/{{$.ProjectSlug}}/code/{{$d.DirName}}/{{.Name}}">{{.Name}}</a></td>
        <td>{{.Size}} B</td>
        <td>{{fmtDateAge .ModTime}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
