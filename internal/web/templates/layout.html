{{define "layout.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ateam{{if .Title}} - {{.Title}}{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body hx-boost="true">
  <nav class="topnav">
    <a href="/" class="nav-brand" style="text-decoration:none">ateam</a>
    {{if .ProjectSlug}}
    <div class="nav-tabs">
      <a href="/p/{{.ProjectSlug}}/" class="nav-tab{{if eq .Nav "overview"}} active{{end}}">Overview</a>
      <a href="/p/{{.ProjectSlug}}/reports" class="nav-tab{{if eq .Nav "reports"}} active{{end}}">Reports</a>
      <a href="/p/{{.ProjectSlug}}/review" class="nav-tab{{if eq .Nav "review"}} active{{end}}">Review</a>
      <a href="/p/{{.ProjectSlug}}/code" class="nav-tab{{if eq .Nav "code"}} active{{end}}">Code</a>
      <a href="/p/{{.ProjectSlug}}/runs" class="nav-tab{{if eq .Nav "runs"}} active{{end}}">Runs</a>
      <a href="/p/{{.ProjectSlug}}/cost" class="nav-tab{{if eq .Nav "cost"}} active{{end}}">Cost</a>
      <a href="/p/{{.ProjectSlug}}/prompts" class="nav-tab{{if eq .Nav "prompts"}} active{{end}}">Prompts</a>
    </div>
    {{end}}
    {{if and (not .SingleMode) (gt (len .Projects) 1)}}
    <select class="project-select" onchange="window.location='/p/'+this.value+'/'">
      {{range .Projects}}
      <option value="{{.Slug}}"{{if eq .Slug $.ProjectSlug}} selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
    {{end}}
  </nav>
  <main>
    {{.Content}}
  </main>
  <script>
  document.addEventListener('click',function(e){var r=e.target.closest('tr[data-href]');if(r&&!e.target.closest('th')){e.preventDefault();window.location.href=r.dataset.href}});
  (function(){
    function initSortable(table){
      var headers=table.querySelectorAll('th[data-sort]');
      headers.forEach(function(th){
        th.addEventListener('click',function(e){
          e.stopPropagation();
          var colIdx=Array.from(th.parentNode.children).indexOf(th);
          var type=th.dataset.sort;
          var desc=th.classList.contains('sort-asc');
          if(!th.classList.contains('sort-asc')&&!th.classList.contains('sort-desc'))desc=true;
          headers.forEach(function(h){h.classList.remove('sort-asc','sort-desc')});
          th.classList.add(desc?'sort-desc':'sort-asc');
          var tbody=table.querySelector('tbody');
          var rows=Array.from(tbody.querySelectorAll('tr'));
          rows.sort(function(a,b){
            var av=(a.children[colIdx]||{}).dataset&&a.children[colIdx].dataset.val||a.children[colIdx].textContent.trim();
            var bv=(b.children[colIdx]||{}).dataset&&b.children[colIdx].dataset.val||b.children[colIdx].textContent.trim();
            var cmp=type==='num'?(parseFloat(av)||0)-(parseFloat(bv)||0):av.localeCompare(bv);
            return desc?-cmp:cmp;
          });
          rows.forEach(function(r){tbody.appendChild(r)});
        });
      });
    }
    document.querySelectorAll('.sortable-table').forEach(initSortable);
  })();
  </script>
</body>
</html>
{{end}}
