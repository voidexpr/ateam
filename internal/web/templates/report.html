{{define "report.html"}}
{{$d := .Data}}
<a href="/p/{{.ProjectName}}/reports" class="back-link">&larr; All reports</a>
<div class="page-header">
  <h1>{{$d.RoleID}}</h1>
  <p class="subtitle">Current report &middot; {{fmtDateAge $d.ModTime}}</p>
</div>
<div class="section">
  <div class="markdown-body">
    {{$d.HTML}}
  </div>
</div>

{{if $d.History}}
<div class="section">
  <div class="section-title">Report History</div>
  <table class="data-table">
    <thead>
      <tr><th>Date</th><th>Age</th><th></th></tr>
    </thead>
    <tbody>
      {{range $d.History}}
      <tr>
        <td>{{.Timestamp.Format "2006-01-02 15:04"}}</td>
        <td>{{fmtDateAge .Timestamp}}</td>
        <td><a href="/p/{{$.ProjectName}}/reports/{{$d.RoleID}}/history/{{.Filename}}">View</a></td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
{{end}}
