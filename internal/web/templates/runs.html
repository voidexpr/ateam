{{define "runs.html"}}
{{$d := .Data}}
<div class="page-header">
  <h1>Agent Runs</h1>
  <p class="subtitle">{{$d.TotalRuns}} run{{if ne $d.TotalRuns 1}}s{{end}}</p>
</div>

{{if $d.Runs}}
<div class="section">
  {{template "runs_table" (runsTableCtx $.ProjectSlug $d.Runs)}}
</div>
{{else}}
<div class="empty-state">
  <h2>No runs</h2>
  <p>Run <code>ateam report</code> or <code>ateam code</code> to create agent runs.</p>
</div>
{{end}}
{{end}}
