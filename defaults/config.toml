[project]
name = ""

[git]
repo = ""
remote_origin_url = ""

[roles]
"code.bugs"                = "on"
"code.recent"              = "on"
"code.structure"           = "on"
"critic.engineering"       = "off"
"critic.features"          = "off"
"critic.project"           = "off"
"database.schema"          = "off"
"design.architecture"      = "on"
"docs.external"            = "on"
"docs.followable"          = "off"
"docs.internal"            = "on"
"perf.benchmarks"          = "off"
"perf.optimization"        = "off"
"project.automation"       = "on"
"project.dependencies"     = "on"
"project.discover_cmd"     = "off"
"project.maintenance"      = "off"
"project.production_ready" = "off"
"project.security"         = "on"
"test.blackbox"            = "off"
"test.gaps"                = "on"
"test.quality"             = "off"
"test.recent"              = "on"

[report]
max_parallel = 3
report_timeout_minutes = 20

[review]
timeout_minutes = 20

[code]
timeout_minutes = 120

[verify]
timeout_minutes = 30

[exec]
timeout_minutes = 60

# [serve]
# port = 8080  # fixed port for 'ateam serve' (default: random)

# [sandbox-extra]
# allow_write = []   # extra filesystem paths granted write access in sandbox
# allow_read = []    # extra filesystem paths granted read access in sandbox
# allow_domains = [] # extra network domains allowed in sandbox

[supervisor]

[profiles]
